name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build artifacts but do NOT publish a GitHub Release"
        type: boolean
        default: true
      version:
        description: "Version string for package filenames (e.g. 0.3.2-rc1). Ignored on tag pushes."
        type: string
        default: "0.0.0-dryrun"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux x86_64 (.deb + .AppImage)
    runs-on: ubuntu-latest
    env:
      # On tag push this is the tag (e.g. v0.3.2); on workflow_dispatch it's the
      # user-supplied version input. The next step strips a leading "v" if any.
      PKG_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Strip v prefix from tag
        run: echo "PKG_VERSION=${PKG_VERSION#v}" >> "$GITHUB_ENV"

      - name: Build packages via Docker
        run: |
          docker build \
            --network host \
            -f Dockerfile.package \
            --build-arg VERSION=${{ env.PKG_VERSION }} \
            -t pikaviewer-package:latest \
            .

      - name: Extract packages
        run: |
          mkdir -p dist/linux
          docker create --name pv-pkg pikaviewer-package:latest
          docker cp pv-pkg:/out/. dist/linux/
          docker rm pv-pkg

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pikaviewer-linux-x86_64
          path: |
            dist/linux/*.deb
            dist/linux/*.AppImage

  build-macos:
    name: macOS arm64 (.dmg)
    runs-on: macos-latest
    env:
      PKG_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Strip v prefix from tag
        run: echo "PKG_VERSION=${PKG_VERSION#v}" >> "$GITHUB_ENV"

      - name: Install libheif
        run: |
          brew install libheif
          echo "PKG_CONFIG_PATH=$(brew --prefix libheif)/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Package .dmg
        run: ./scripts/package-macos.sh --dmg --version ${{ env.PKG_VERSION }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pikaviewer-macos-arm64
          path: dist/macos/PikaViewer-*.dmg

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos]
    # Skip on dry-run dispatches; always run on tag pushes.
    if: github.event_name == 'push' || inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/pikaviewer-linux-x86_64/*
            artifacts/pikaviewer-macos-arm64/*
