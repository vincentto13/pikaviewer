name: CI

on:
  push:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libvulkan-dev mesa-vulkan-drivers \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev libxxf86vm-dev \
            libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev libudev-dev

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libvulkan-dev mesa-vulkan-drivers \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev libxxf86vm-dev \
            libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev libudev-dev

      - name: cargo test
        run: cargo test --workspace

  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install libheif
        run: |
          brew install libheif
          echo "PKG_CONFIG_PATH=$(brew --prefix libheif)/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: cargo clippy (with HEIC)
        run: cargo clippy --workspace --features iv-app/heic -- -D warnings

      - name: cargo build
        run: cargo build --release --features iv-app/heic
