name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy-linux:
    name: Clippy (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libvulkan-dev mesa-vulkan-drivers \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev libxxf86vm-dev \
            libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev libudev-dev

      # HEIC feature skipped: Ubuntu's libheif (1.17) is too old for
      # libheif-sys (requires >= 1.18). The HEIC crate has no platform-
      # specific code, so macOS CI covers it with Homebrew's newer libheif.
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  clippy-macos:
    name: Clippy (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install libheif
        run: |
          brew install libheif
          echo "PKG_CONFIG_PATH=$(brew --prefix libheif)/lib/pkgconfig:$(brew --prefix)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: cargo clippy
        run: cargo clippy --workspace --features iv-app/heic -- -D warnings
