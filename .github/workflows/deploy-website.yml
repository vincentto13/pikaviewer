name: Deploy Website

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  trigger-website:
    name: Trigger PikaViewer website pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitLab pipeline
        run: |
          curl -sf -X POST \
            "https://gitlab.astrolabius.xyz/api/v4/projects/41/trigger/pipeline" \
            --form "token=${{ secrets.PIKAVIEWER_WEBSITE_PIPELINE_TOKEN }}" \
            --form "ref=main"
